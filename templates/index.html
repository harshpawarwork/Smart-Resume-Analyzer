<!DOCTYPE html>
<html>
<head>
    <title>Smart Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚀 Smart Resume Analyzer</h1>

    <form method="POST" enctype="multipart/form-data" class="card">

        <!-- Drag & Drop -->
        <div id="drop-area">
            <p id="file-label">Drag & Drop Resume Here</p>
            <p>or</p>
            <label for="fileElem" class="upload-btn">Choose File</label>
            <input type="file" id="fileElem" name="resume" accept=".pdf" required>
        </div>

        <textarea name="job_desc" placeholder="Paste Job Description" required></textarea>

        <select name="role">
            <option>Software Engineer</option>
            <option>Data Analyst</option>
            <option>ML Engineer</option>
        </select>

        <button type="submit">Analyze</button>
    </form>

</div>

<script>
let dropArea = document.getElementById("drop-area");
let fileInput = document.getElementById("fileElem");
let fileLabel = document.getElementById("file-label");

// Highlight
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("highlight");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("highlight");
});

// Drop file
dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("highlight");

    let files = e.dataTransfer.files;
    if (files.length > 0) {
        fileInput.files = files;

        // ✅ SHOW FILE NAME
        fileLabel.innerText = "Selected: " + files[0].name;
    }
});

// Choose file (important fix)
fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileLabel.innerText = "Selected: " + fileInput.files[0].name;
    }
});
</script>

</body>
</html>
